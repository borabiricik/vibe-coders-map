name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/shared-types/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Resolve accessible Cloudflare account
        env:
          CONFIGURED_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.request

          token = os.environ.get("CLOUDFLARE_API_TOKEN", "")
          if not token:
              raise SystemExit("Missing CLOUDFLARE_API_TOKEN secret.")

          request = urllib.request.Request(
              "https://api.cloudflare.com/client/v4/accounts",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
              },
          )

          try:
              with urllib.request.urlopen(request) as response:
                  payload = json.load(response)
          except Exception as exc:
              raise SystemExit(f"Unable to list Cloudflare accounts for this token: {exc}")

          accounts = payload.get("result", [])
          if not accounts:
              raise SystemExit(
                  "This Cloudflare API token cannot access any accounts. Check the token scope."
              )

          accessible_ids = {account["id"] for account in accounts}
          configured = os.environ.get("CONFIGURED_ACCOUNT_ID", "")

          if configured and configured not in accessible_ids:
              names = ", ".join(account.get("name", account["id"]) for account in accounts)
              raise SystemExit(
                  "Configured CLOUDFLARE_ACCOUNT_ID is not accessible to this token. "
                  f"Accessible accounts: {names}"
              )

          account_id = configured or accounts[0]["id"]
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              env_file.write(f"CLOUDFLARE_ACCOUNT_ID={account_id}\n")
          PY

      - name: Inject production Cloudflare bindings
        working-directory: apps/api
        env:
          CLOUDFLARE_D1_DATABASE_ID: ${{ vars.CLOUDFLARE_D1_DATABASE_ID }}
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ vars.CLOUDFLARE_KV_NAMESPACE_ID }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          replacements = {
              "placeholder-d1-database-id": os.environ.get("CLOUDFLARE_D1_DATABASE_ID", ""),
              "placeholder-kv-namespace-id": os.environ.get("CLOUDFLARE_KV_NAMESPACE_ID", ""),
          }

          missing = [key for key, value in replacements.items() if not value]
          if missing:
              raise SystemExit(f"Missing GitHub repo variables for: {', '.join(missing)}")

          path = Path("wrangler.toml")
          text = path.read_text()
          for placeholder, value in replacements.items():
              text = text.replace(placeholder, value)
          path.write_text(text)
          PY

      - name: Check D1 migration access
        id: d1-access
        working-directory: apps/api
        run: |
          if npx wrangler d1 list >/dev/null 2>&1; then
            echo "accessible=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Cloudflare token cannot access D1 APIs. Skipping remote migrations for this deploy."
            echo "accessible=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run D1 Migrations
        if: steps.d1-access.outputs.accessible == 'true'
        working-directory: apps/api
        run: npx wrangler d1 migrations apply vibe-coders-db --remote

      - name: Deploy Worker
        working-directory: apps/api
        run: npx wrangler deploy
