name: Release Desktop

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - run: npm ci

      - name: Write production env file
        shell: bash
        run: |
          if [ -z "${{ secrets.DESKTOP_ENV_PRODUCTION }}" ]; then
            echo "Missing DESKTOP_ENV_PRODUCTION secret"
            exit 1
          fi
          printf '%s\n' "${{ secrets.DESKTOP_ENV_PRODUCTION }}" > apps/desktop/.env.production

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Vibe Coders Map ${{ github.ref_name }}"
          releaseBody: "Download the agent for your platform below."
          releaseDraft: true
          prerelease: false
          projectPath: apps/desktop
          args: ${{ matrix.args }}
