name = "vibe-coders-map-api"
main = "src/index.ts"
compatibility_date = "2026-03-01"

[observability]
enabled = true
head_sampling_rate = 1

[[d1_databases]]
binding = "DB"
database_name = "vibe-coders-db"
database_id = "placeholder-d1-database-id"

[[kv_namespaces]]
binding = "KV"
id = "placeholder-kv-namespace-id"

[[ratelimits]]
name = "HEARTBEAT_RATE_LIMITER"
namespace_id = "1001"

  [ratelimits.simple]
  limit = 10
  period = 60

[triggers]
crons = ["*/10 * * * *"]
